name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ── Build each slice on its native runner ────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Run tests (native only)
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload slice artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccswitch-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/ccswitch
          if-no-files-found: error

  # ── Combine slices into a universal binary and publish ───────────────────
  release:
    name: Create Release
    needs: build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 slice
        uses: actions/download-artifact@v4
        with:
          name: ccswitch-arm64
          path: slices/arm64

      - name: Download x86_64 slice
        uses: actions/download-artifact@v4
        with:
          name: ccswitch-x86_64
          path: slices/x86_64

      - name: Create universal binary
        run: |
          mkdir -p dist
          chmod +x slices/arm64/ccswitch slices/x86_64/ccswitch
          lipo -create \
            slices/arm64/ccswitch \
            slices/x86_64/ccswitch \
            -output dist/ccswitch
          lipo -info dist/ccswitch

      - name: Generate checksum
        run: |
          cd dist
          shasum -a 256 ccswitch | tee ccswitch.sha256
          cat ccswitch.sha256

      - name: Get tag name
        id: tag
        run: echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ccswitch ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/ccswitch
            dist/ccswitch.sha256
